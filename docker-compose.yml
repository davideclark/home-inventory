services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: home_inventory
      POSTGRES_USER: inventory
      POSTGRES_PASSWORD: inventory_local
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inventory -d home_inventory"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./server
    environment:
      DATABASE_URL: postgresql://inventory:inventory_local@postgres:5432/home_inventory
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
