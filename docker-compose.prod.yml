services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: home_inventory
      POSTGRES_USER: inventory
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-inventory_local}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inventory -d home_inventory"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    image: ${DOCKERHUB_USERNAME}/home-inventory-api:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://inventory:${POSTGRES_PASSWORD:-inventory_local}@postgres:5432/home_inventory
      PORT: 3000
      API_TOKEN: ${API_TOKEN:-}
      SERVER_NAME: ${SERVER_NAME:-Home Inventory}
      IMAGE_PATH: /images
    volumes:
      - ${IMAGES_PATH:-/volume1/docker/home-inventory/images}:/images
    ports:
      - "${API_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    image: ${DOCKERHUB_USERNAME}/home-inventory-web:latest
    restart: unless-stopped
    environment:
      API_URL: http://api:3000
      API_TOKEN: ${API_TOKEN:-}
      WEB_PASSWORD: ${WEB_PASSWORD:-}
      SESSION_SECRET: ${SESSION_SECRET:-}
    ports:
      - "${WEB_PORT:-3001}:3001"
    depends_on:
      - api

volumes:
  postgres_data:
